coverage:
  status:
    project:
      default:
        # Fail the PR status check if overall coverage drops by more than 1%.
        threshold: 1%
    patch:
      default:
        # Fail if the lines changed in the PR are less than 80% covered.
        target: 80%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default   # post once, update on new commits
  require_changes: true  # only comment if coverage changed
