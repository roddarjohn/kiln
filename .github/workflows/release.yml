name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      pr_number: ${{ steps.release.outputs.pr }}
      pr_branch: ${{ steps.branch.outputs.branch }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Get PR branch
        id: branch
        if: ${{ steps.release.outputs.pr }}
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          branch=$(echo "$PR_JSON" | jq -r '.headBranchName')
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

  update-lockfile:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr_branch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: astral-sh/setup-uv@v7
      - run: uv lock
      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --cached --quiet || git commit -m "chore: update uv.lock"
          git push
