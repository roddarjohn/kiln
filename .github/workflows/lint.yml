name: lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ runner.os }}|py3.14|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: SKIP=ruff,ruff-format uvx pre-commit run --all-files
      - run: uv run --group lint ruff check
      - run: uv run --group lint ruff format --check
      - run: uv run --group lint zuban check src/
