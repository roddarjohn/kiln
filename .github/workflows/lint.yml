name: lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ runner.os }}|py3.14|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: SKIP=ruff,ruff-format,check-control-blank-lines uvx pre-commit run --all-files
      - run: uv run --group lint ruff check
      - run: uv run --group lint ruff format --check
      - run: uv run --group lint zuban check src/
      - run: uv run python scripts/check_control_blank_lines.py
