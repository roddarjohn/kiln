name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Strict single-version build: trips on any sphinx warning.
  # Runs on every PR so doc warnings can't accumulate.  Cheap --
  # builds the current tree only, no version-shim, no deploy.
  # The versioned multi-tag build + Pages deploy lives in
  # release.yml, gated on release-please cutting a release, so
  # the deploy ref is ``refs/heads/main`` (not the release tag)
  # and stays inside the github-pages environment allowlist.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"
      - uses: extractions/setup-just@v4
      - run: just docs-check
