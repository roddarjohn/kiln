# Alembic configuration for the kiln playground.
#
# Run migrations from the playground/ directory:
#   just playground-migrate
#   just playground-migration msg="describe your change"
#   just playground-downgrade

[alembic]
# Path to the alembic environment scripts, relative to this file.
script_location = alembic

# Template for new revision files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated revision timestamps.
timezone = UTC

# Prepend sys.path with these directories when running env.py.
# The playground root and the generated/ subdirectory both need to be
# on the path so that model imports resolve correctly.
prepend_sys_path = .
                   generated

# SQLAlchemy connection URL — overridden at runtime by env.py reading
# the DATABASE_URL environment variable.
sqlalchemy.url = postgresql+asyncpg://localhost/dev

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
